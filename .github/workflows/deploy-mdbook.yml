name: Deploy mdBook to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mdBook
        run: |
          MDBOOK_VERSION=v0.4.40
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/${MDBOOK_VERSION}/mdbook-${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C /usr/local/bin/
          mdbook --version
      - name: Build ZH book
        working-directory: site/zh
        run: mdbook build
      - name: Build EN book
        working-directory: site/en
        run: mdbook build
      - name: Assemble combined site
        run: |
          mkdir -p _site
          cp -r site/zh/book/* _site/
          mkdir -p _site/en
          cp -r site/en/book/* _site/en/
          # Make root index point to ZH; EN reachable via /en/
          # Drop convenience links to existing PDFs and cover
          [ -f OpenBook-FDE-zh.pdf ] && cp OpenBook-FDE-zh.pdf _site/
          [ -f OpenBook-FDE-en.pdf ] && cp OpenBook-FDE-en.pdf _site/
          [ -f cover.png ] && cp cover.png _site/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
