title: "OpenBook · Forward Deployed Engineer"
description: "AI 应用的落地工程学 — A field manual for shipping AI to customers"
remote_theme: just-the-docs/just-the-docs

url: "https://dawei008.github.io"
baseurl: "/fde-book"

# Permalink: don't include the .md suffix; keep folder structure
permalink: pretty

# Just-the-Docs settings
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s\-/，。、；：（）()]+/
  rel_url: true
  button: true

color_scheme: light

logo: "/cover.png"
favicon_ico: "/cover.png"

heading_anchors: true

aux_links:
  "GitHub":
    - "https://github.com/dawei008/fde-book"
  "English":
    - "/fde-book/en/preface/"
aux_links_new_tab: true

footer_content: 'Source on <a href="https://github.com/dawei008/fde-book">GitHub</a>. CC-BY-SA 4.0.'

# Files Jekyll should NOT process
exclude:
  - README.md
  - SUMMARY.md
  - TRANSLATE_PROMPT.md
  - demos/
  - research/
  - book/
  - vendor/
  - .gitignore

# Use kramdown for markdown; allow HTML inside
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  hard_wrap: false

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

# Default front matter for all chapters (so we don't need to add it to every file)
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: default

# Collections — treat each part as a top-level nav group
collections_dir: ""

# Just-the-Docs nav structure: parts auto-grouped via front matter we'll inject
