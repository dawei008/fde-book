[book]
title = "OpenBook · Forward Deployed Engineer"
authors = ["dawei008"]
language = "en"
src = "src"

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/dawei008/fde-book"
edit-url-template = "https://github.com/dawei008/fde-book/edit/main/en/{path}"
site-url = "/fde-book/en/"
copy-fonts = true
additional-css = ["theme/cjk.css"]

[output.html.search]
enable = true

[output.html.print]
enable = true
