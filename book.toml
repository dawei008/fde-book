[book]
title = "OpenBook: Forward Deployed Engineer — AI 应用的落地工程学"
authors = ["Dawei"]
description = "OpenBook 系列第二册。Forward Deployed Engineer 的工程实用手册：AI 应用从 PoC 到生产的落地工程学。7 个 Part / 17 章 / 4 附录 / 中英双语。覆盖 Discovery、脚手架、客户数据栈、PoC→生产、Agent 部署、Handoff、T 字成长。"
language = "zh-CN"
src = "."

[build]
build-dir = "book"
create-missing = false

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/dawei008/fde-book"
git-repository-icon = "fa-github"
edit-url-template = "https://github.com/dawei008/fde-book/edit/main/{path}"
site-url = "/fde-book/"
no-section-label = false

[output.html.fold]
enable = true
level = 0

[output.html.search]
enable = true
limit-results = 30
teaser-word-count = 30
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3
